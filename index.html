<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tiferet · Агроконтроль</title>

<!-- Иконка на главный экран iPhone -->
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Tiferet" />
<meta name="theme-color" content="#421B4F" />

<!-- Шрифт Montserrat -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root{
    --accent:#421B4F; --accent-deep:#2C0F36; --accent-soft:#F0EAF3; --accent-mid:#E3D7E9;
    --paper:#FAF8FB; --card:#FFFFFF; --ink:#211826; --sub:#6B6072; --line:#EAE3EE;
    --green:#2E8B57; --green-soft:#E4F2EA; --amber:#B9791C; --amber-soft:#F7EED9;
    --red:#C0392B; --red-soft:#F8E4E1; --gray:#9A93A0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:'Montserrat','Inter','Segoe UI',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-wrap:break-word;word-break:normal}

  /* Мягкие переносы для длинных русских слов */
  .title,.meta,.hint,.cmt,.fixbox,.factbox,.warn,.rules,.author,.dates,
  .empty,.panel h3,.field label,table.plan td,table.rep td.crop,.blame .ln{
    -webkit-hyphens:auto;hyphens:auto;overflow-wrap:break-word}
  /* Кнопки и числа не переносим */
  .btn,.badge,.stat .num,.weeklabel .v,.tabs button,.login-roles button{
    -webkit-hyphens:none;hyphens:none}
  .wrap{max-width:680px;margin:0 auto;padding:0 0 100px}
  input,select,button,textarea{font-family:inherit}
  img.logo{display:block;height:32px;width:auto}
  img.logo-lg{display:block;height:46px;width:auto;margin:0 auto 14px}

  /* ЛОГИН */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(120% 80% at 50% 0%, #EFE8F2 0%, var(--paper) 60%)}
  .login-card{width:100%;max-width:370px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:26px 22px;box-shadow:0 12px 40px rgba(44,15,54,.10)}
  .login-brand{text-align:center;margin-bottom:20px}
  .login-brand .tagline{font-size:12px;color:var(--sub);margin-top:2px}
  .login-roles{display:flex;gap:6px;margin-bottom:16px}
  .login-roles button{flex:1;padding:11px 2px;border-radius:11px;border:1.5px solid var(--line);
    background:var(--card);cursor:pointer;font-size:13px;font-weight:700;color:var(--sub)}
  .login-roles button.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-deep)}
  #login input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;font-size:15px;outline:none;margin-bottom:10px}
  #login input:focus{border-color:var(--accent)}
  #loginBtn{width:100%;padding:13px;border:none;border-radius:11px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  #loginErr{color:var(--red);font-size:13px;margin-top:8px;min-height:16px;text-align:center}
  .remember{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--sub);margin:2px 0 12px}

  /* ШАПКА */
  header{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:1px solid var(--line);padding:12px 18px}
  @supports(padding:max(0px)){
    header{padding-top:max(12px, env(safe-area-inset-top))}
    #login{padding-top:max(24px, env(safe-area-inset-top))}
  }
  .brand{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand .tag{font-size:11px;color:var(--sub)}
  .userbar{display:flex;align-items:center;gap:8px;margin-top:10px;background:var(--accent-soft);border-radius:10px;padding:8px 12px}
  .userbar .who{font-size:13.5px;font-weight:700;color:var(--accent-deep)}
  .userbar .sp{margin-left:auto;display:flex;gap:12px}
  .linkbtn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-weight:600;padding:0}

  /* Регламент */
  .rules{margin:10px 18px 0;background:var(--card);border:1px solid var(--accent-mid);border-left:4px solid var(--accent);
    border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--sub);line-height:1.5}
  .rules b{color:var(--accent-deep)}
  .rules .due{margin-top:6px;font-size:12px}
  .rules .due span{display:inline-block;margin-right:12px}
  .due-ok{color:var(--green);font-weight:700}
  .due-late{color:var(--red);font-weight:700}
  .due-soon{color:var(--amber);font-weight:700}

  .tabs{display:flex;gap:6px;padding:12px 18px 0}
  .tabs button{flex:1;padding:9px 0;border-radius:9px;border:1px solid var(--line);background:var(--card);
    cursor:pointer;font-size:12.5px;font-weight:700;color:var(--sub)}
  .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  .weekbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 4px}
  .weeknav{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--card);
    cursor:pointer;font-size:18px;color:var(--accent-deep);display:flex;align-items:center;justify-content:center}
  .weeklabel{text-align:center}
  .weeklabel .k{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.6px}
  .weeklabel .v{font-size:15px;font-weight:700}
  .stats{display:flex;gap:8px;padding:10px 18px 2px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px}
  .stat .num{font-size:21px;font-weight:800;line-height:1}
  .stat .lbl{font-size:11px;color:var(--sub);margin-top:3px}

  .pad{padding:10px 18px 0}
  .addbtn{width:100%;padding:13px;border:1.5px dashed var(--accent);border-radius:12px;
    background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:15px;cursor:pointer}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin:10px 18px 0}
  .panel h3{margin:0 0 12px;font-size:15px}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border-radius:9px;border:1px solid var(--line);
    background:#fff;font-size:14px;color:var(--ink);outline:none}
  .field textarea{resize:vertical;min-height:58px}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .row{display:flex;gap:10px}.row>*{flex:1}.w120{flex:0 0 120px}
  .btn{padding:10px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600;border:none;
    display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.ghost{background:var(--card);color:var(--sub);border:1px solid var(--line)}
  .btn.green{background:var(--green);color:#fff}
  .btn.red{background:var(--red);color:#fff}
  .btn.wide{width:100%}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap}.btnrow>.btn{flex:1 1 auto}
  .cfgline{display:flex;gap:8px;align-items:center;margin-top:6px}.cfgline input{flex:1}

  .cropsec{margin:16px 18px 0}
  .cropsec .head{display:flex;align-items:center;gap:8px;margin:6px 2px 8px}
  .cropsec .head .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .cropsec .head .name{font-size:15px;font-weight:800;color:var(--accent-deep)}
  .cropsec .head .ga{font-size:12px;color:var(--sub);background:var(--accent-soft);padding:2px 9px;border-radius:20px;font-weight:600}

  .card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;overflow:hidden;margin-bottom:10px}
  .card.overdue{border-color:var(--red)}
  .card .body{padding:12px 14px}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card .title{font-size:16px;font-weight:700;line-height:1.25}
  .card.rejected .title{text-decoration:line-through;color:var(--sub)}
  .badge{flex-shrink:0;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .tagfix{display:inline-block;font-size:10.5px;font-weight:700;color:#fff;background:var(--amber);
    padding:2px 7px;border-radius:20px;margin-left:6px;vertical-align:middle}
  .author{font-size:11px;color:var(--sub);margin-top:5px}
  .author b{color:var(--accent-deep)}
  .meta{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:8px;font-size:13px;color:var(--sub)}
  .meta .strong{font-weight:700;color:var(--ink)}
  .fixbox{margin-top:9px;background:var(--amber-soft);border-radius:9px;padding:8px 10px;font-size:12.5px;color:#7d5310}
  .fixbox .lb{font-size:11px;font-weight:700;color:var(--amber);display:block;margin-bottom:3px}
  .fixbox .was{text-decoration:line-through;opacity:.7}
  .factbox{margin-top:9px;background:var(--green-soft);border-radius:9px;padding:8px 10px;font-size:12.5px;color:#1f6b42}
  .factbox b{color:#155534}
  .cmt{margin-top:8px;background:var(--accent-soft);border-radius:9px;padding:8px 10px;font-size:12.5px;color:var(--accent-deep)}
  .cmt .lb{font-size:11px;font-weight:700;color:var(--accent);display:block;margin-bottom:2px}
  .dates{margin-top:9px;font-size:12.5px;color:var(--sub);display:flex;flex-wrap:wrap;gap:4px 14px}
  .warn{margin-top:10px;padding:8px 10px;border-radius:8px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
  .warn.red{background:var(--red-soft);color:var(--red)}
  .warn.amber{background:var(--amber-soft);color:var(--amber)}
  .hint{margin-top:8px;font-size:12px;color:var(--sub)}
  .actions{margin-top:12px}
  .empty{text-align:center;padding:46px 20px;color:var(--sub)}
  .empty .big{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
  .sync{padding:8px 18px 0;font-size:11.5px;color:var(--sub);display:flex;align-items:center;gap:6px}
  .sync .d{width:8px;height:8px;border-radius:50%;background:var(--gray)}
  .sync .d.ok{background:var(--green)}.sync .d.off{background:var(--amber)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent-deep);color:#fff;
    padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:50;
    box-shadow:0 6px 20px rgba(0,0,0,.2);opacity:0;transition:.2s;pointer-events:none}
  .toast.show{opacity:1}

  table.rep{width:100%;border-collapse:collapse;font-size:13px}
  table.rep th,table.rep td{padding:9px 6px;border-bottom:1px solid var(--line);text-align:center}
  table.rep th{font-size:11px;color:var(--sub);font-weight:700;text-transform:uppercase}
  table.rep td.crop{text-align:left;font-weight:700;color:var(--accent-deep)}
  table.rep tr.total td{font-weight:800;border-top:2px solid var(--accent-mid);border-bottom:none}
  .v-green{color:var(--green);font-weight:700}
  .v-red{color:var(--red);font-weight:700}
  .v-amber{color:var(--amber);font-weight:700}
  .blame{margin:10px 18px 0;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .blame .ln{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--line)}
  .blame .ln:last-child{border-bottom:none}

  /* ===== ГРАФИКИ ===== */
  .hbar{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:12.5px}
  .hbar .lb{flex:0 0 40%;max-width:40%;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hbar .track{flex:1;display:block;background:var(--accent-soft);border-radius:6px;height:20px;position:relative;overflow:hidden;
    background-image:linear-gradient(90deg,transparent 0,transparent calc(50% - 1px),rgba(0,0,0,.10) calc(50% - 1px),rgba(0,0,0,.10) 50%,transparent 50%)}
  .hbar .fill{display:block;height:100%;border-radius:6px;min-width:3px}
  .axis{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:10.5px;color:var(--sub)}
  .axis .lb{flex:0 0 40%;max-width:40%}
  .axis .val{flex:0 0 auto;min-width:56px}
  .axis .ax{flex:1;display:flex;justify-content:space-between}
  .axis .ax i{font-style:normal}
  .hbar .val{flex:0 0 auto;font-weight:700;color:var(--sub);min-width:56px;text-align:right}
  .vbars{display:flex;align-items:flex-end;gap:8px;height:170px;padding:6px 2px 0}
  .vbar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .vbar .col{width:70%;max-width:42px;background:var(--accent);border-radius:6px 6px 0 0;min-height:2px}
  .vbar .cv{font-size:11px;font-weight:700;color:var(--accent-deep);margin-bottom:3px}
  .vbar .cx{font-size:10.5px;color:var(--sub);margin-top:5px;text-align:center;line-height:1.2}
  .donutwrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .donut{width:130px;height:130px;border-radius:50%;flex:0 0 auto;position:relative}
  .donut .hole{position:absolute;inset:22%;background:var(--card);border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-direction:column}
  .donut .hole .big{font-size:22px;font-weight:800;color:var(--accent-deep);line-height:1}
  .donut .hole .sm{font-size:10px;color:var(--sub)}
  .legend{display:flex;flex-direction:column;gap:6px;font-size:12.5px;flex:1;min-width:150px}
  .legend .li{display:flex;align-items:center;gap:8px}
  .legend .sw{width:12px;height:12px;border-radius:3px;flex:0 0 auto}
  .legend .lv{margin-left:auto;font-weight:700}
  .chart-empty{color:var(--sub);font-size:13px;padding:10px 0}

  /* ===== ВСПЛЫВАЮЩЕЕ ОКНО ===== */
  .modal-back{position:fixed;inset:0;background:rgba(20,8,26,.5);z-index:200;
    display:flex;align-items:flex-start;justify-content:center;padding:18px 12px;overflow:auto}
  .modal{background:var(--card);border-radius:16px;width:100%;max-width:520px;
    box-shadow:0 18px 50px rgba(0,0,0,.3);margin:auto 0;animation:pop .16s ease-out}
  @keyframes pop{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  .modal .mhead{display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);border-radius:16px 16px 0 0}
  .modal .mhead h3{margin:0;font-size:15px}
  .modal .mclose{background:none;border:none;font-size:22px;line-height:1;color:var(--sub);cursor:pointer;padding:0 4px}
  .modal .mbody{padding:14px 16px 16px}

  /* ===== ПЕЧАТНЫЙ ПЛАН ===== */
  #printView{padding:0 18px}
  .sheet{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:12px}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;gap:12px;
    border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:12px}
  .sheet-head .ttl{font-size:16px;font-weight:800;color:var(--accent-deep)}
  .sheet-head .sub{font-size:12px;color:var(--sub);margin-top:2px}
  .day{margin-bottom:14px;break-inside:avoid}
  .day-h{font-size:13px;font-weight:800;color:#fff;background:var(--accent);
    padding:5px 10px;border-radius:6px;display:inline-block;margin-bottom:6px}
  table.plan{width:100%;border-collapse:collapse;font-size:12.5px}
  table.plan th{background:var(--accent-soft);color:var(--accent-deep);font-size:11px;font-weight:700;
    padding:6px 7px;text-align:left;border:1px solid var(--accent-mid)}
  table.plan td{padding:7px;border:1px solid var(--line);vertical-align:top}
  table.plan td.chk{width:26px;text-align:center;font-size:15px;color:var(--gray)}
  table.plan .cr{font-weight:700;color:var(--accent-deep)}
  table.plan .nm{font-weight:600}
  table.plan .note{color:var(--sub);font-size:11.5px;display:block;margin-top:2px}
  .sheet-foot{margin-top:14px;padding-top:10px;border-top:1px solid var(--line);
    font-size:11.5px;color:var(--sub);display:flex;justify-content:space-between;gap:20px}
  .sign{margin-top:18px;display:flex;gap:30px;font-size:12px;color:var(--sub)}
  .sign div{flex:1;border-top:1px solid var(--ink);padding-top:4px}

  @media print{
    @page{margin:12mm}
    body{background:#fff}
    header,.sync,.tabs,.rules,#weekView,#monthView,#settings,.toast,.noprint{display:none!important}
    #printView{display:block!important;padding:0}
    .wrap{max-width:100%;padding:0}
    .sheet{border:none;border-radius:0;padding:0;margin:0}
    .day-h{background:#421B4F!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    table.plan th{background:#F0EAF3!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>

<!-- ВХОД -->
<div id="login">

      <div class="weeklabel"><div class="k">План на неделю</div><div class="v" id="printWeekLabel"></div></div>
      <button class="weeknav" onclick="shiftWeek(1)">›</button>
    </div>
    <div class="pad noprint"><button class="btn primary wide" onclick="window.print()">🖨 Распечатать план</button></div>
    <div id="printBody"></div>
  </div>

  <div id="monthView" style="display:none">
    <div class="weekbar">
      <button class="weeknav" onclick="shiftMonth(-1)">‹</button>
      <div class="weeklabel"><div class="k">Месяц</div><div class="v" id="monthLabel"></div></div>
      <button class="weeknav" onclick="shiftMonth(1)">›</button>
    </div>
    <div id="monthBody"></div>
  </div>

  <div id="storeView" style="display:none">
    <div class="pad" id="storeAdd"></div>
    <div id="storeForm"></div>
    <div id="storeBody"></div>
  </div>

  <div id="chartsView" style="display:none">
    <div id="chartsBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== РОЛИ ===== 
   Паролей здесь НЕТ — они хранятся в вашей Google Таблице (лист «Пользователи»)
   и проверяются на стороне Google Apps Script. */
const ROLE_LABELS = {
  consultant: "Консультант",
  agronomist: "Агроном Михаил · вносит Оксана",
  viewer:     "Сводка · только просмотр"
};

const OVERDUE_DAYS = 3;
const WEEK_DAYS = 7;
const UNITS = ["л/га","кг/га","мл/га","г/га","т/га","л","кг"];
const DEFAULT_CROPS = [
  {name:"Огурец",ga:0},{name:"Картофель",ga:0},{name:"Слива",ga:0},
  {name:"Брокколи",ga:0},{name:"Пекинка",ga:0},{name:"Малина",ga:0}
];
const AUTHOR = {consultant:"Консультант", agronomist:"Агроном Михаил"};
const CATS = ["СЗР","Удобрение","Посадочный материал"];
const MONTHS=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const DAYS=["Понедельник","Вторник","Среда","Четверг","Пятница","Суббота","Воскресенье"];
/* родительный падеж — «до среды», «до пятницы» */
const DAYS_GEN=["понедельника","вторника","среды","четверга","пятницы","субботы","воскресенья"];
const DAYS_SHORT=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
function dayGen(n){return DAYS_GEN[n-1];}

/* Адрес вашего Google Apps Script (Web App).
   Единственное место, где он есть. Меняется только здесь — если однажды
   сделаете новое развёртывание и Google выдаст другую ссылку. */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJ7SiJTVBUd7mFz3uLFkwWlRd0Kf94zt9GWzLhNwI2DSUCFmUxMX2aLwgtOpEGEX6k/exec";

const REFRESH_MS = 45000;   // как часто подтягивать изменения из таблицы

let cfg=loadLocal("tiferet_cfg",{crops:DEFAULT_CROPS,dayCons:3,dayAgro:5});
if(!cfg.crops||!cfg.crops.length)cfg.crops=DEFAULT_CROPS;
if(!cfg.dayCons)cfg.dayCons=3;   // среда
if(!cfg.dayAgro)cfg.dayAgro=5;   // пятница
let items=loadLocal("tiferet_items",[]);
let products=loadLocal("tiferet_products",[]);   // препараты СЗР {id,name,unit,cat}
let invoices=loadLocal("tiferet_invoices",[]);   // накладные (приход)
let editInv=null;                                // редактируемая накладная
let session=loadLocal("tiferet_session",null);
let auth=session?session.role:null;
let role=auth;
let loginRole="consultant";
let weekStart=addDays(mondayOf(new Date()),7);
let monthCur=new Date(new Date().getFullYear(),new Date().getMonth(),1);
let view="week";
let showForm=false;
let editingId=null;   // открыт ли инлайн-редактор — тогда фоновое обновление ждёт

function loadLocal(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function saveLocal(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function saveCfg(){saveLocal("tiferet_cfg",cfg);}
function saveItemsCache(){saveLocal("tiferet_items",items);saveLocal("tiferet_products",products);saveLocal("tiferet_invoices",invoices);}

/* ===== ВХОД (пароль проверяет Google Apps Script) ===== */
function pickLoginRole(r){loginRole=r;
  ["consultant","agronomist","viewer"].forEach(k=>{document.getElementById("lr-"+k).className=(k===r?"on":"");});
  document.getElementById("loginErr").textContent="";}

async function doLogin(){
  const err=document.getElementById("loginErr");
  err.style.color="var(--red)";
  const p=document.getElementById("loginPass").value;
  if(!p){err.textContent="Введите пароль";return;}
  const btn=document.getElementById("loginBtn");
  btn.disabled=true;btn.textContent="Проверка…";err.textContent="";
  try{
    const u=SCRIPT_URL+"?action=login&role="+encodeURIComponent(loginRole)
      +"&pass="+encodeURIComponent(p)+"&t="+Date.now();
    const r=await fetch(u,{method:"GET"});
    const d=await r.json();
    if(d&&d.ok&&d.token){
      session={token:d.token,role:d.role};
      auth=d.role;role=d.role;
      if(document.getElementById("rememberMe").checked)saveLocal("tiferet_session",session);
      document.getElementById("loginPass").value="";
      showApp();
    } else {
      err.textContent=(d&&d.error==="badpass")?"Неверный пароль":"Не удалось войти";
    }
  }catch(e){
    err.textContent="Нет связи с таблицей — попробуйте ещё раз";
  }
  btn.disabled=false;btn.textContent="Войти";
}

function logout(){
  session=null;auth=null;role=null;saveLocal("tiferet_session",null);
  document.getElementById("loginPass").value="";
  document.getElementById("loginErr").textContent="";
  document.getElementById("app").style.display="none";
  document.getElementById("login").style.display="flex";
}
function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("userRole").textContent=ROLE_LABELS[role];
  document.getElementById("cfgBtn").style.display=(role==="viewer"?"none":"inline");
  document.getElementById("tabs").style.display="flex";
  document.getElementById("tab-store").style.display = (role==="consultant"?"none":"block");
  fillDaySelects();setView("week");refresh();
}
function setView(v){view=v;
  ["week","store","charts","print","month"].forEach(k=>{
    const b=document.getElementById("tab-"+k); if(b)b.className=(k===v?"on":"");
  });
  document.getElementById("weekView").style.display=v==="week"?"block":"none";
  document.getElementById("storeView").style.display=v==="store"?"block":"none";
  document.getElementById("chartsView").style.display=v==="charts"?"block":"none";
  document.getElementById("printView").style.display=v==="print"?"block":"none";
  document.getElementById("monthView").style.display=v==="month"?"block":"none";
  render();}

/* ===== GOOGLE SHEETS ===== */
function tok(){return session&&session.token?session.token:"";}
async function apiAll(){
  const u=SCRIPT_URL+"?action=all&token="+encodeURIComponent(tok())+"&t="+Date.now();
  const r=await fetch(u,{method:"GET"});return await r.json();}
async function apiPost(p){
  p.token=tok();
  await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});}

async function refresh(silent){
  const dot=document.getElementById("syncDot"),txt=document.getElementById("syncTxt");
  if(!silent){txt.textContent="Синхронизация…";dot.className="d";}
  try{
    const data=await apiAll();
    if(data&&data.error==="auth"){toast("Сессия истекла — войдите заново");logout();return;}
    if(Array.isArray(data.treatments))items=data.treatments;
    if(Array.isArray(data.products))products=data.products;
    if(Array.isArray(data.invoices))invoices=data.invoices;
    if(Array.isArray(data.crops)&&data.crops.length)cfg.crops=data.crops;
    if(data.settings){if(data.settings.dayCons)cfg.dayCons=Number(data.settings.dayCons);
      if(data.settings.dayAgro)cfg.dayAgro=Number(data.settings.dayAgro);fillDaySelects();}
    saveItemsCache();saveCfg();
    dot.className="d ok";
    txt.textContent="Подключено · обновлено "+new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
    render();
  }catch(e){
    dot.className="d off";txt.textContent="Нет связи — показаны сохранённые данные";
    if(!silent)render();
  }
}

/* Тихое обновление в фоне: подтягиваем правки из таблицы,
   но не мешаем, если человек прямо сейчас что-то заполняет. */
function autoRefresh(){
  if(!session||!session.token)return;
  if(document.hidden)return;
  if(showForm||editingId)return;      // открыта форма — не трогаем
  if(document.getElementById("settings").style.display==="block")return;
  refresh(true);
}
setInterval(autoRefresh, REFRESH_MS);
document.addEventListener("visibilitychange",()=>{if(!document.hidden)autoRefresh();});
window.addEventListener("focus",autoRefresh);
async function pushUpsert(it){saveItemsCache();try{await apiPost({action:"upsert",item:it});confirmWrite();}catch(e){toast("Не записалось в таблицу");}}
async function pushDelete(id){saveItemsCache();try{await apiPost({action:"delete",id});confirmWrite();}catch(e){toast("Не удалилось в таблице");}}
async function pushCrops(){saveCfg();try{await apiPost({action:"setCrops",crops:cfg.crops});}catch(e){}}
async function pushDays(){saveCfg();try{await apiPost({action:"setSettings",settings:{dayCons:cfg.dayCons,dayAgro:cfg.dayAgro}});}catch(e){}}
async function pushInvoice(inv){saveItemsCache();try{await apiPost({action:"upsertInvoice",invoice:inv});confirmWrite();}catch(e){toast("Не записалось в таблицу");}}
async function pushDeleteInvoice(id){saveItemsCache();try{await apiPost({action:"deleteInvoice",id});confirmWrite();}catch(e){toast("Не удалилось");}}
async function pushProducts(){saveItemsCache();try{await apiPost({action:"setProducts",products});}catch(e){}}
/* после записи перечитываем таблицу — чтобы на экране было ровно то, что в ней */
let writeT;function confirmWrite(){clearTimeout(writeT);writeT=setTimeout(()=>{if(!showForm&&!editingId)refresh(true);},1500);}

/* ===== ДАТЫ ===== */
const MS=86400000;
function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function mondayOf(d){const x=startOfDay(d);const g=(x.getDay()+6)%7;x.setDate(x.getDate()-g);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function fmt(d){return new Date(d).toLocaleDateString("ru-RU",{day:"2-digit",month:"short"});}
function fmtFull(d){return new Date(d).toLocaleDateString("ru-RU",{day:"2-digit",month:"long",year:"numeric"});}
function fmtInput(d){const x=new Date(d);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");}
function daysBetween(a,b){return Math.floor((startOfDay(b)-startOfDay(a))/MS);}
/* дедлайн на неделе, предшествующей неделе обработок */
function deadlineFor(ws,dayNum){return addDays(mondayOf(ws),-7+(dayNum-1));}

/* ===== СТАТУС ===== */
function statusOf(t){
  const now=startOfDay(new Date());
  if(t.status==="rejected")return{key:"rejected",label:"Не будет",color:"var(--gray)",soft:"#EEECF2"};
  if(t.status==="done")return{key:"done",label:"Выполнено",color:"var(--green)",soft:"var(--green-soft)"};
  const weekEnd=addDays(mondayOf(t.weekStart),WEEK_DAYS-1);
  if(t.plannedDate){
    const late=daysBetween(t.plannedDate,now);
    if(late>=OVERDUE_DAYS)return{key:"overdue",label:"Не выполнено",color:"var(--red)",soft:"var(--red-soft)",late};
  } else if(daysBetween(weekEnd,now)>0){
    return{key:"overdue",label:"Дата не назначена",color:"var(--red)",soft:"var(--red-soft)",late:null};
  }
  if(t.status==="accepted")return{key:"accepted",label:"В работе",color:"var(--accent)",soft:"var(--accent-soft)"};
  if(daysBetween(deadlineFor(t.weekStart,cfg.dayAgro),now)>0)
    return{key:"noanswer",label:"Агроном не ответил",color:"var(--amber)",soft:"var(--amber-soft)"};
  return{key:"proposed",label:"Ждёт агронома",color:"var(--amber)",soft:"var(--amber-soft)"};
}

/* ===== ДЕЙСТВИЯ ===== */
function shiftWeek(n){weekStart=addDays(weekStart,n*7);render();}
function shiftMonth(n){monthCur=new Date(monthCur.getFullYear(),monthCur.getMonth()+n,1);render();}
function toggleSettings(){const s=document.getElementById("settings");
  s.style.display=s.style.display==="none"?"block":"none";
  if(s.style.display==="block"){fillDaySelects();renderCropBlock();}}
function fillDaySelects(){
  const a=document.getElementById("dayCons"),b=document.getElementById("dayAgro");
  if(!a||!b)return;
  const cap=(s)=>s.charAt(0).toUpperCase()+s.slice(1);
  const opt=(sel)=>DAYS_GEN.map((d,i)=>`<option value="${i+1}"${sel===i+1?" selected":""}>${cap(d)}</option>`).join("");
  a.innerHTML=opt(cfg.dayCons);b.innerHTML=opt(cfg.dayAgro);
}
function saveDays(){
  cfg.dayCons=Number(document.getElementById("dayCons").value);
  cfg.dayAgro=Number(document.getElementById("dayAgro").value);
  pushDays();render();toast("Регламент сохранён");
}
function weekItems(){return items.filter(t=>mondayOf(t.weekStart).getTime()===weekStart.getTime()).sort((a,b)=>(a.plannedDate||9e15)-(b.plannedDate||9e15));}

function addTreatment(){
  const g=id=>document.getElementById(id);
  const name=g("f_name").value.trim(),rate=g("f_rate").value.trim();
  if(!name||!rate){toast("Заполните название и норму");return;}
  const pd=g("f_date").value;
  const t={id:Date.now()+""+Math.random().toString(36).slice(2,6),
    crop:g("f_crop").value,name,substance:g("f_sub").value.trim(),
    rate,unit:g("f_unit").value,area:g("f_area").value.trim(),
    weekStart:weekStart.getTime(),createdAt:Date.now(),createdBy:AUTHOR[role],
    status: role==="agronomist"?"accepted":"proposed",
    plannedDate: pd?new Date(pd).getTime():null,
    completedDate:null,rejectReason:"",comment:"",
    editedByAgro:"",editComment:"",origSubstance:"",origRate:"",origUnit:"",
    actSubstance:"",actProductId:"",actRate:"",actUnit:"",factComment:""};
  items.push(t);pushUpsert(t);showForm=false;render();
  toast(role==="agronomist"?"Обработка добавлена в работу":"Предложение отправлено агроному");
}
function updateItem(id,patch){const t=items.find(x=>x.id===id);if(!t)return;Object.assign(t,patch);editingId=null;pushUpsert(t);render();}
function deleteItem(id){items=items.filter(x=>x.id!==id);pushDelete(id);render();}
function askDelete(id){const t=items.find(x=>x.id===id);
  if(confirm("Удалить обработку «"+(t?t.name:"")+"»? Действие необратимо."))deleteItem(id);}
function onCropSelect(){const c=document.getElementById("f_crop").value;const cr=cfg.crops.find(x=>x.name===c);if(cr&&cr.ga)document.getElementById("f_area").value=cr.ga;}

function addCrop(){const n=document.getElementById("newCropName").value.trim(),g=document.getElementById("newCropGa").value.trim();
  if(!n)return;cfg.crops.push({name:n,ga:g?Number(g):0});
  document.getElementById("newCropName").value="";document.getElementById("newCropGa").value="";
  pushCrops();renderCropBlock();render();}
function updateCrop(i,f,v){cfg.crops[i][f]=f==="ga"?(v?Number(v):0):v;pushCrops();}
function removeCrop(i){cfg.crops.splice(i,1);pushCrops();renderCropBlock();render();}

/* ===== РЕНДЕР ===== */
function esc(s){return(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function canEdit(){return role==="consultant"||role==="agronomist";}

function renderRules(){
  const now=startOfDay(new Date());
  const dc=deadlineFor(weekStart,cfg.dayCons), da=deadlineFor(weekStart,cfg.dayAgro);
  const mark=(d)=>{const n=daysBetween(now,d);
    if(n<0)return `<span class="due-late">срок прошёл (${fmt(d)})</span>`;
    if(n===0)return `<span class="due-soon">сегодня (${fmt(d)})</span>`;
    if(n<=1)return `<span class="due-soon">завтра (${fmt(d)})</span>`;
    return `<span class="due-ok">${fmt(d)} · через ${n} дн.</span>`;};
  document.getElementById("rules").innerHTML=
    `<b>Регламент.</b> Консультант вносит план на будущую неделю до <b>${dayGen(cfg.dayCons)}</b>,
     агроном отвечает и вносит свои планы до <b>${dayGen(cfg.dayAgro)}</b>.
     <div class="due"><span>Консультант: ${mark(dc)}</span><span>Агроном: ${mark(da)}</span></div>`;
}

function render(){
  if(auth!==role)role=auth;
  renderRules();
  if(view==="month"){renderMonth();return;}
  if(view==="print"){renderPrint();return;}
  if(view==="store"){renderStore();return;}
  if(view==="charts"){renderCharts();return;}

  const ws=weekStart,we=addDays(ws,WEEK_DAYS-1);
  document.getElementById("weekLabel").textContent=fmt(ws)+" — "+fmt(we);
  const cur=mondayOf(new Date()).getTime();
  document.getElementById("weekKind").textContent=
    ws.getTime()===cur?"Текущая неделя":(ws.getTime()===cur+7*MS?"Следующая неделя":"Неделя");

  const list=weekItems();
  let done=0,over=0,acc=0;
  list.forEach(t=>{const s=statusOf(t);if(s.key==="done")done++;else if(s.key==="overdue")over++;else if(s.key==="accepted")acc++;});
  document.getElementById("stats").innerHTML=
    stat("Всего",list.length,"var(--ink)")+stat("Выполнено",done,"var(--green)")+
    stat("В работе",acc,"var(--accent)")+stat("Просрочено",over,"var(--red)");

  document.getElementById("addWrap").innerHTML=(canEdit()&&!showForm)
    ?`<button class="addbtn" onclick="openForm()">＋ ${role==="agronomist"?"Добавить обработку":"Назначить обработку"}</button>`:"";
  document.getElementById("formWrap").innerHTML=(canEdit()&&showForm)?formHTML():"";

  const el=document.getElementById("list");
  if(list.length===0){
    el.innerHTML=`<div class="empty"><div class="big">На эту неделю обработок нет</div>
      <div>${role==="viewer"?"Планы появятся, когда их внесут консультант или агроном.":"Нажмите кнопку выше, чтобы добавить."}</div></div>`;
    return;}
  const groups={};list.forEach(t=>{const c=t.crop||"Без культуры";(groups[c]=groups[c]||[]).push(t);});
  let html="";
  Object.keys(groups).sort((a,b)=>a.localeCompare(b,"ru")).forEach(cn=>{
    const cr=cfg.crops.find(c=>c.name===cn);const ga=cr&&cr.ga?cr.ga+" га":"";
    html+=`<div class="cropsec"><div class="head"><span class="dot"></span><span class="name">${esc(cn)}</span>${ga?`<span class="ga">${esc(ga)}</span>`:""}</div>`;
    groups[cn].forEach(t=>html+=cardHTML(t));html+=`</div>`;});
  el.innerHTML=html;
}
function stat(l,n,c){return `<div class="stat"><div class="num" style="color:${c}">${n}</div><div class="lbl">${l}</div></div>`;}
function cancelEdit(){editingId=null;render();}
function openForm(){showForm=true;editingId=null;render();}
function closeForm(){showForm=false;editingId=null;render();}

function formHTML(){
  const opts=cfg.crops.map(c=>`<option value="${esc(c.name)}">${esc(c.name)}${c.ga?" ("+c.ga+" га)":""}</option>`).join("");
  const units=UNITS.map(u=>`<option value="${u}">${u}</option>`).join("");
  return `<div class="panel"><h3>${role==="agronomist"?"Обработка от агронома Михаила":"Предложение консультанта"}</h3>
    <div class="field"><label>Культура</label><select id="f_crop" onchange="onCropSelect()">${opts}</select></div>
    <div class="field"><label>Название обработки *</label><input id="f_name" placeholder="Напр. Фунгицидная обработка"/></div>
    <div class="field"><label>Препарат</label><input id="f_sub" placeholder="Напр. Тилт, КЭ"/></div>
    <div class="row">
      <div class="field"><label>Норма расхода *</label><input id="f_rate" type="number" inputmode="decimal" placeholder="0.5"/></div>
      <div class="field w120"><label>Ед.</label><select id="f_unit">${units}</select></div>
    </div>
    <div class="row">
      <div class="field"><label>Площадь, Га</label><input id="f_area" type="number" inputmode="decimal" placeholder="авто"/></div>
      <div class="field"><label>Плановая дата</label><input id="f_date" type="date" value="${fmtInput(addDays(weekStart,2))}"/></div>
    </div>
    <div class="btnrow"><button class="btn primary" onclick="addTreatment()">＋ ${role==="agronomist"?"Добавить":"Назначить"}</button>
      <button class="btn ghost" onclick="closeForm()">Отмена</button></div></div>`;
}

function cardHTML(t){
  const s=statusOf(t);
  const cls="card"+(s.key==="overdue"?" overdue":"")+(s.key==="rejected"?" rejected":"");
  let h=`<div class="body">
    <div class="top"><div class="title">${esc(t.name)}${t.editedByAgro?`<span class="tagfix">Корректировка агронома</span>`:""}</div>
      <span class="badge" style="color:${s.color};background:${s.soft}">${s.label}</span></div>
    <div class="author">Назначил: <b>${esc(t.createdBy||"—")}</b></div>
    <div class="meta">
      <span>План: ${t.substance?esc(t.substance)+" · ":""}<span class="strong">${esc(t.rate)} ${esc(t.unit)}</span></span>
      ${t.area?`<span>${esc(t.area)} га</span>`:""}
    </div>`;

  if(t.editedByAgro){
    const was=`${t.origSubstance?esc(t.origSubstance)+" · ":""}${esc(t.origRate)} ${esc(t.origUnit)}`;
    const now=`${t.substance?esc(t.substance)+" · ":""}${esc(t.rate)} ${esc(t.unit)}`;
    h+=`<div class="fixbox"><span class="lb">Агроном скорректировал (${fmt(t.editedByAgro)})</span>
      <span class="was">${was}</span> → <b>${now}</b>
      ${t.editComment?`<div style="margin-top:4px">${esc(t.editComment)}</div>`:""}</div>`;
  }
  if(t.status==="done"&&(t.actSubstance||t.actRate))
    h+=`<div class="factbox">Факт: ${t.actSubstance?"<b>"+esc(t.actSubstance)+"</b> · ":""}<b>${esc(t.actRate||t.rate)} ${esc(t.actUnit||t.unit)}</b></div>`;
  if(t.factComment)h+=`<div class="cmt"><span class="lb">Комментарий агронома</span>${esc(t.factComment)}</div>`;
  if(t.rejectReason)h+=`<div class="cmt"><span class="lb">Почему не будет</span>${esc(t.rejectReason)}</div>`;
  if(t.comment)h+=`<div class="cmt"><span class="lb">Заметка агронома</span>${esc(t.comment)}</div>`;

  h+=`<div class="dates"><span>Внесено: ${fmt(t.createdAt)}</span>
    ${t.plannedDate?`<span>Плановая дата: <b style="color:var(--ink)">${fmt(t.plannedDate)}</b></span>`:""}
    ${t.completedDate?`<span style="color:var(--green)">✓ Выполнено ${fmt(t.completedDate)}</span>`:""}</div>`;

  if(s.key==="overdue")
    h+= s.late!=null?`<div class="warn red">⚠ Просрочено на ${s.late} дн. после плановой даты — не выполнено.</div>`
                    :`<div class="warn red">⚠ Неделя прошла, плановая дата так и не назначена.</div>`;
  else if(s.key==="noanswer")h+=`<div class="warn amber">⏳ Агроном не ответил до ${dayGen(cfg.dayAgro)}.</div>`;
  else if(s.key==="accepted"&&t.plannedDate){
    const left=daysBetween(startOfDay(new Date()),t.plannedDate);
    h+=`<div class="hint">${left>0?("До обработки "+left+" дн."):(left===0?"Обработка сегодня":("Прошло "+(-left)+" дн. после плановой даты · красным через "+(OVERDUE_DAYS+left)+" дн."))}</div>`;
  }

  if(role==="agronomist"){
    h+=`<div class="actions">`;
    if(t.status==="proposed"){
      h+=`<div class="btnrow">
        <button class="btn green" onclick="updateItem('${t.id}',{status:'accepted'})">✓ Принять</button>
        <button class="btn ghost" style="color:var(--amber)" onclick="startEdit('${t.id}')">✎ Корректировать</button>
        <button class="btn ghost" style="color:var(--red)" onclick="startReject('${t.id}')">✕ Не будет</button>
      </div><div id="rej_${t.id}"></div><div id="edit_${t.id}"></div>`;
    } else if(t.status==="accepted"){
      h+=`<div class="btnrow">
        <button class="btn ghost" style="color:var(--accent)" onclick="startDate('${t.id}')">📅 ${t.plannedDate?"Дата":"Дата"}</button>
        <button class="btn ghost" style="color:var(--amber)" onclick="startEdit('${t.id}')">✎ Корректировать</button>
        <button class="btn ghost" onclick="startNote('${t.id}')">💬 Заметка</button>
        <button class="btn green" onclick="startConfirm('${t.id}')">✓ Внести факт</button>
      </div><div id="date_${t.id}"></div><div id="edit_${t.id}"></div><div id="note_${t.id}"></div><div id="conf_${t.id}"></div>`;
    } else if(t.status==="done"){
      h+=`<div class="btnrow">
        <button class="btn ghost" onclick="startConfirm('${t.id}')">Изменить факт</button>
        <button class="btn ghost" onclick="updateItem('${t.id}',{status:'accepted',completedDate:null})">Отменить выполнение</button>
      </div><div id="conf_${t.id}"></div>`;
    } else if(t.status==="rejected"){
      h+=`<button class="btn ghost wide" onclick="updateItem('${t.id}',{status:'accepted',rejectReason:''})">Вернуть в работу</button>`;
    }
    h+=`</div>`;
  }
  if(role==="consultant"||role==="agronomist")
    h+=`<button class="linkbtn" style="margin-top:10px;color:var(--gray)" onclick="askDelete('${t.id}')">🗑 Удалить обработку</button>`;
  h+=`</div>`;
  return `<div class="${cls}" style="border-left-color:${s.color}">${h}</div>`;
}

/* ===== формы агронома ===== */
function startReject(id){editingId=id;document.getElementById("rej_"+id).innerHTML=
  `<div class="field" style="margin-top:8px"><label>Почему обработки не будет</label>
     <textarea id="rr_${id}" placeholder="Напр. дождь, фаза не подошла, нет препарата"></textarea></div>
   <div class="btnrow"><button class="btn red" onclick="doReject('${id}')">Сохранить</button>
     <button class="btn ghost" onclick="cancelEdit()">Отмена</button></div>`;}
function doReject(id){const r=document.getElementById("rr_"+id).value.trim();
  if(!r){toast("Напишите причину");return;}updateItem(id,{status:"rejected",rejectReason:r});}

/* корректировка плана агрономом — original сохраняется и показывается */
function startEdit(id){editingId=id;
  const t=items.find(x=>x.id===id);
  const units=UNITS.map(u=>`<option value="${u}"${u===t.unit?" selected":""}>${u}</option>`).join("");
  const dv=t.plannedDate?fmtInput(t.plannedDate):fmtInput(addDays(mondayOf(t.weekStart),2));
  document.getElementById("edit_"+id).innerHTML=
  `<div class="panel" style="margin:10px 0 0;padding:12px">
    <h3 style="font-size:14px">Корректировка агронома</h3>
    <div class="hint" style="margin:0 0 10px">Исходно от консультанта: ${t.origSubstance||t.substance?esc(t.origSubstance||t.substance)+" · ":""}${esc(t.origRate||t.rate)} ${esc(t.origUnit||t.unit)}</div>
    <div class="field"><label>Препарат</label><input id="e_sub_${id}" value="${esc(t.substance||"")}"/></div>
    <div class="row">
      <div class="field"><label>Норма</label><input id="e_rate_${id}" type="number" inputmode="decimal" value="${esc(t.rate||"")}"/></div>
      <div class="field w120"><label>Ед.</label><select id="e_unit_${id}">${units}</select></div>
    </div>
    <div class="field"><label>Плановая дата</label><input id="e_date_${id}" type="date" value="${dv}"/></div>
    <div class="field"><label>Почему корректируем *</label>
      <textarea id="e_cmt_${id}" placeholder="Напр. снизили норму — слабое развитие болезни">${esc(t.editComment||"")}</textarea></div>
    <div class="btnrow"><button class="btn primary" onclick="doEdit('${id}')">Сохранить корректировку</button>
      <button class="btn ghost" onclick="cancelEdit()">Отмена</button></div>
  </div>`;
}
function doEdit(id){
  const t=items.find(x=>x.id===id);
  const sub=document.getElementById("e_sub_"+id).value.trim();
  const rate=document.getElementById("e_rate_"+id).value.trim();
  const unit=document.getElementById("e_unit_"+id).value;
  const dv=document.getElementById("e_date_"+id).value;
  const cmt=document.getElementById("e_cmt_"+id).value.trim();
  if(!rate){toast("Укажите норму");return;}
  if(!cmt){toast("Напишите, почему корректируете");return;}
  const patch={substance:sub,rate,unit,editComment:cmt,editedByAgro:Date.now(),
    plannedDate:dv?new Date(dv).getTime():t.plannedDate,status:t.status==="proposed"?"accepted":t.status};
  if(!t.origRate){patch.origSubstance=t.substance;patch.origRate=t.rate;patch.origUnit=t.unit;}
  updateItem(id,patch);toast("Корректировка сохранена — видна консультанту");
}

function startNote(id){editingId=id;const t=items.find(x=>x.id===id);
  document.getElementById("note_"+id).innerHTML=
  `<div class="field" style="margin-top:8px"><label>Заметка агронома</label>
     <textarea id="nt_${id}" placeholder="Любая заметка по обработке">${esc(t.comment||"")}</textarea></div>
   <div class="btnrow"><button class="btn primary" onclick="doNote('${id}')">Сохранить</button>
     <button class="btn ghost" onclick="cancelEdit()">Отмена</button></div>`;}
function doNote(id){updateItem(id,{comment:document.getElementById("nt_"+id).value.trim()});}

function startDate(id){editingId=id;const t=items.find(x=>x.id===id);
  const v=t.plannedDate?fmtInput(t.plannedDate):fmtInput(addDays(mondayOf(t.weekStart),2));
  document.getElementById("date_"+id).innerHTML=
  `<div class="btnrow" style="margin-top:8px;align-items:center">
     <input id="dt_${id}" type="date" value="${v}" style="padding:9px 10px;border:1px solid var(--line);border-radius:9px"/>
     <button class="btn primary" onclick="doDate('${id}')">Сохранить дату</button>
     <button class="btn ghost" onclick="cancelEdit()">Отмена</button></div>`;}
function doDate(id){updateItem(id,{plannedDate:new Date(document.getElementById("dt_"+id).value).getTime()});}

function startConfirm(id){editingId=id;
  const t=items.find(x=>x.id===id);
  const sub=t.actSubstance||t.substance||"",rate=t.actRate||t.rate||"",unit=t.actUnit||t.unit||"л/га";
  const dv=t.completedDate?fmtInput(t.completedDate):fmtInput(new Date());
  const units=UNITS.map(u=>`<option value="${u}"${u===unit?" selected":""}>${u}</option>`).join("");
  const datalist=products.map(p=>`<option value="${esc(p.name)}">`).join("");
  document.getElementById("conf_"+id).innerHTML=
  `<div class="panel" style="margin:10px 0 0;padding:12px">
    <h3 style="font-size:14px;margin-bottom:10px">Что фактически внесли</h3>
    <div class="field"><label>Препарат (со склада или свой)</label>
      <input id="c_sub_${id}" list="prodlist" value="${esc(sub)}" oninput="stockHint('${id}')"/>
      <datalist id="prodlist">${datalist}</datalist>
      <div class="hint" id="c_hint_${id}"></div>
    </div>
    <div class="row">
      <div class="field"><label>Количество (норма)</label><input id="c_rate_${id}" type="number" inputmode="decimal" value="${esc(rate)}" oninput="stockHint('${id}')"/></div>
      <div class="field w120"><label>Ед.</label><select id="c_unit_${id}" onchange="stockHint('${id}')">${units}</select></div>
    </div>
    <div class="field"><label>Дата обработки</label><input id="c_date_${id}" type="date" value="${dv}"/></div>
    <div class="field"><label>Комментарий — почему больше / меньше плана</label>
      <textarea id="c_cmt_${id}" placeholder="Напр. снизили норму, слабое развитие болезни">${esc(t.factComment||"")}</textarea></div>
    <div class="btnrow"><button class="btn green" onclick="doConfirm('${id}')">✓ Подтвердить выполнение</button>
      <button class="btn ghost" onclick="cancelEdit()">Отмена</button></div>
  </div>`;
  stockHint(id);
}
/* живая подсказка: сколько спишется и сколько останется на складе */
function stockHint(id){
  const t=items.find(x=>x.id===id); if(!t)return;
  const name=(document.getElementById("c_sub_"+id).value||"").trim();
  const rate=Number(document.getElementById("c_rate_"+id).value||0);
  const unit=document.getElementById("c_unit_"+id).value;
  const el=document.getElementById("c_hint_"+id); if(!el)return;
  const p=products.find(x=>x.name.trim().toLowerCase()===name.toLowerCase());
  if(!p){el.textContent = name?"Нет на складе — спишется, склад уйдёт в минус":"";el.style.color="var(--amber)";return;}
  const area=Number(t.area||0);
  const need=(/\/га/.test(unit)&&area>0)?rate*area:rate;
  const left=stockLeft(p);
  const after=left-need+consumedQty(t);   // если факт меняем, старое списание вернётся
  el.innerHTML=`На складе: <b>${fmtNum(left)} ${esc(p.unit||"")}</b> · спишется ≈ <b>${fmtNum(need)}</b> · останется ≈ <b>${fmtNum(after)}</b>`;
  el.style.color = after<0 ? "var(--red)" : "var(--sub)";
}
function doConfirm(id){
  const t=items.find(x=>x.id===id);
  const sub=document.getElementById("c_sub_"+id).value.trim();
  const rate=document.getElementById("c_rate_"+id).value.trim();
  const unit=document.getElementById("c_unit_"+id).value;
  const dv=document.getElementById("c_date_"+id).value;
  const cmt=document.getElementById("c_cmt_"+id).value.trim();
  if(!rate){toast("Укажите количество");return;}
  if(Number(rate)!==Number(t.rate)&&!cmt){toast("Норма отличается от плана — напишите комментарий");return;}
  const dt=dv?new Date(dv).getTime():Date.now();
  const p=products.find(x=>x.name.trim().toLowerCase()===sub.toLowerCase());
  updateItem(id,{status:"done",actSubstance:sub,actProductId:p?p.id:"",actRate:rate,actUnit:unit,factComment:cmt,completedDate:dt});
  toast(p?"Выполнено · списано со склада":"Обработка выполнена");
}

/* ===== ОБЗОР ЗА МЕСЯЦ ===== */
function monthItems(){
  const y=monthCur.getFullYear(),m=monthCur.getMonth();
  return items.filter(t=>{const d=new Date(t.plannedDate||t.weekStart);return d.getFullYear()===y&&d.getMonth()===m;});
}
function renderMonth(){
  document.getElementById("monthLabel").textContent=MONTHS[monthCur.getMonth()]+" "+monthCur.getFullYear();
  const list=monthItems();const el=document.getElementById("monthBody");
  if(list.length===0){el.innerHTML=`<div class="empty"><div class="big">За этот месяц данных нет</div></div>`;return;}
  const g={};
  list.forEach(t=>{const c=t.crop||"Без культуры";g[c]=g[c]||{total:0,done:0,over:0,rej:0,wait:0};
    const s=statusOf(t);g[c].total++;
    if(s.key==="done")g[c].done++;else if(s.key==="overdue")g[c].over++;
    else if(s.key==="rejected")g[c].rej++;else g[c].wait++;});
  const names=Object.keys(g).sort((a,b)=>a.localeCompare(b,"ru"));
  const T={total:0,done:0,over:0,rej:0,wait:0};
  names.forEach(n=>["total","done","over","rej","wait"].forEach(k=>T[k]+=g[n][k]));
  let rows=names.map(n=>{const r=g[n];const pct=r.total?Math.round(r.done/r.total*100):0;
    return `<tr><td class="crop">${esc(n)}</td><td>${r.total}</td><td class="v-green">${r.done}</td>
      <td class="${r.over?"v-red":""}">${r.over}</td><td class="${r.rej?"v-amber":""}">${r.rej}</td><td><b>${pct}%</b></td></tr>`;}).join("");
  const pctT=T.total?Math.round(T.done/T.total*100):0;
  rows+=`<tr class="total"><td class="crop">Итого</td><td>${T.total}</td><td class="v-green">${T.done}</td>
    <td class="${T.over?"v-red":""}">${T.over}</td><td class="${T.rej?"v-amber":""}">${T.rej}</td><td>${pctT}%</td></tr>`;

  const over=list.filter(t=>statusOf(t).key==="overdue").length;
  const rej=list.filter(t=>statusOf(t).key==="rejected").length;
  const noAns=list.filter(t=>statusOf(t).key==="noanswer").length;
  const noDate=list.filter(t=>statusOf(t).key==="overdue"&&!t.plannedDate).length;
  const fixed=list.filter(t=>t.editedByAgro).length;
  const byCons=list.filter(t=>t.createdBy===AUTHOR.consultant).length;
  const byAgro=list.filter(t=>t.createdBy===AUTHOR.agronomist).length;

  el.innerHTML=`
    <div class="stats">${stat("Обработок",T.total,"var(--ink)")}${stat("Выполнено",T.done,"var(--green)")}
      ${stat("Сорвано",T.over,"var(--red)")}${stat("Отменено",T.rej,"var(--amber)")}</div>
    <div class="panel"><h3>По культурам</h3><table class="rep">
      <tr><th style="text-align:left">Культура</th><th>Всего</th><th>Вып.</th><th>Сорв.</th><th>Отмен.</th><th>%</th></tr>
      ${rows}</table></div>
    <div class="blame">
      <div class="ln"><span>Не выполнено в срок</span><b class="${over?"v-red":""}">${over}</b></div>
      <div class="ln"><span>Из них без назначенной даты</span><b>${noDate}</b></div>
      <div class="ln"><span>Отменено агрономом с причиной</span><b class="${rej?"v-amber":""}">${rej}</b></div>
      <div class="ln"><span>Осталось без ответа агронома</span><b class="${noAns?"v-amber":""}">${noAns}</b></div>
      <div class="ln"><span>Скорректировано агрономом</span><b>${fixed}</b></div>
      <div class="ln"><span>Назначил консультант</span><b>${byCons}</b></div>
      <div class="ln"><span>Назначил агроном Михаил</span><b>${byAgro}</b></div>
    </div>
    <div class="panel"><h3>Отменённые и сорванные — причины</h3>
      ${list.filter(t=>["rejected","overdue"].includes(statusOf(t).key)).map(t=>{const s=statusOf(t);
        return `<div style="padding:8px 0;border-bottom:1px solid var(--line)">
          <div style="font-size:13.5px;font-weight:700">${esc(t.crop)} · ${esc(t.name)}
            <span class="badge" style="color:${s.color};background:${s.soft};margin-left:6px">${s.label}</span></div>
          <div style="font-size:12.5px;color:var(--sub);margin-top:3px">
            ${t.rejectReason?esc(t.rejectReason):(t.comment?esc(t.comment):"Причина не указана")}</div></div>`;}).join("")
        ||`<div class="hint">Ничего не сорвано — все обработки выполнены.</div>`}
    </div>`;
}

/* ===== СКЛАД СЗР ===== */
function prodById(id){return products.find(p=>p.id===id)||null;}
function consumedQty(t){
  if(t.status!=="done")return 0;
  const rate=Number(t.actRate||0); if(!rate)return 0;
  const area=Number(t.area||0), unit=String(t.actUnit||"");
  return (/\/га/.test(unit)&&area>0) ? rate*area : rate;   // л/га × га = л, иначе как есть
}
function inForProduct(p){let s=0;invoices.forEach(v=>{if(v.productId===p.id)s+=Number(v.qty||0);});return s;}
function outForProduct(p){
  let s=0;
  items.forEach(t=>{
    if(t.status!=="done")return;
    const byId = t.actProductId && t.actProductId===p.id;
    const byName = !t.actProductId && t.actSubstance &&
      t.actSubstance.trim().toLowerCase()===p.name.trim().toLowerCase();
    if(byId||byName)s+=consumedQty(t);
  });
  return s;
}
function stockLeft(p){return (Number(p.opening)||0)+inForProduct(p)-(Number(p.used2026)||0)-outForProduct(p);}
function fmtNum(n){n=Number(n)||0;return (Math.round(n*100)/100).toLocaleString("ru-RU");}

function renderStore(){
  const canAdd = (role==="agronomist");
  document.getElementById("storeAdd").innerHTML = (canAdd && !showForm)
    ? `<button class="addbtn" onclick="openInvoiceForm()">＋ Накладная (приход)</button>` : "";
  document.getElementById("storeForm").innerHTML = (canAdd && showForm) ? invoiceFormHTML() : "";

  const body=document.getElementById("storeBody");

  // остатки, сгруппированные по типу (СЗР / Удобрение / Посадочный материал)
  function stockTable(list){
    const rows=list.slice().sort((a,b)=>a.name.localeCompare(b.name,"ru")).map(p=>{
      const open=Number(p.opening)||0, used=Number(p.used2026)||0, inp=inForProduct(p), out=outForProduct(p), left=open+inp-used-out;
      const base=open+inp;
      const cls=left<=0?"v-red":(base>0&&left<base*0.15?"v-amber":"v-green");
      return `<tr><td class="crop">${esc(p.name)}</td><td>${esc(p.unit||"")}</td>
        <td>${open?fmtNum(open):"—"}</td><td>${fmtNum(inp)}</td><td>${(used+out)?fmtNum(used+out):"—"}</td><td class="${cls}">${fmtNum(left)}</td></tr>`;
    }).join("");
    return `<table class="rep">
      <tr><th style="text-align:left">Наименование</th><th>Ед.</th><th>01.01</th><th>Приход</th><th>Расход</th><th>Остаток</th></tr>
      ${rows}</table>`;
  }
  let stockBlock="";
  if(products.length){
    CATS.forEach(cat=>{
      const list=products.filter(p=>(p.cat||"СЗР")===cat);
      if(!list.length)return;
      stockBlock+=`<div class="panel"><h3>Остатки · ${esc(cat)}</h3>${stockTable(list)}</div>`;
    });
    stockBlock+=`<div class="hint" style="margin:8px 18px 0">Расход считается по факту обработок. Красным — закончилось, жёлтым — на исходе.</div>`;
  } else {
    stockBlock=`<div class="empty"><div class="big">Склад пуст</div><div>${canAdd?"Внесите первую накладную.":"Накладные вносит агроном."}</div></div>`;
  }

  // накладные (новые сверху) с редактированием
  const invSorted=invoices.slice().sort((a,b)=>(b.date||0)-(a.date||0));
  let invBlock = invSorted.length ? `<div class="panel"><h3>Накладные (${invSorted.length})</h3>
    <table class="rep">
      <tr><th style="text-align:left">Дата</th><th style="text-align:left">Наименование</th><th>Кол-во</th><th>Сумма</th>${canAdd?"<th></th>":""}</tr>
      ${invSorted.map(v=>{
        const sum=(Number(v.qty||0)*Number(v.price||0));
        return `<tr>
          <td style="text-align:left">${v.date?fmt(v.date):"—"}<div class="hint" style="margin:0">${esc(v.supplier||"")} ${v.invoiceNo?"№"+esc(v.invoiceNo):""}${v.grand?" · накл. "+fmtNum(v.grand):""}</div></td>
          <td style="text-align:left">${esc(v.productName||"")}</td>
          <td>${fmtNum(v.qty)} ${esc(v.unit||"")}</td>
          <td>${sum?fmtNum(sum):"—"}</td>
          ${canAdd?`<td style="white-space:nowrap"><button class="linkbtn" onclick="editInvoice('${v.id}')">✎</button>
            <button class="linkbtn" style="color:var(--red);margin-left:6px" onclick="askDelInvoice('${v.id}')">✕</button></td>`:""}
        </tr>`;}).join("")}
    </table></div>` : "";

  body.innerHTML = stockBlock + invBlock;
}

function suppliersList(){
  const s=[...new Set(invoices.map(v=>(v.supplier||"").trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ru"));
  return s.map(x=>`<option value="${esc(x)}">`).join("");
}
function openInvoiceForm(){editInv=null;showForm=true;render();}
function editInvoice(id){editInv=id;showForm=true;render();}

  const lineSum=v?(Number(v.qty||0)*Number(v.price||0)):0;

   <div class="modal">

      <button class="mclose" onclick="closeInvoiceForm()">×</button></div>
    <div class="mbody">

        <datalist id="suplist">${suppliersList()}</datalist>
      </div>
      <div class="field"><label>Наименование (препарат / удобрение / посадочный)</label>
        <input id="iv_prod" list="prodlist" value="${v?esc(v.productName||""):""}" placeholder="введите первые буквы для поиска"/>
        <datalist id="prodlist">${prodDl}</datalist>
      </div>
      <div class="row">
        <div class="field"><label>Количество</label><input id="iv_qty" type="number" inputmode="decimal" value="${v?esc(v.qty):""}" placeholder="0" oninput="lineSumHint()"/></div>
        <div class="field w120"><label>Ед.</label><select id="iv_unit">${units}</select></div>
      </div>
      <div class="field"><label>Цена за единицу, MDL</label>
        <input id="iv_price" type="number" inputmode="decimal" value="${v&&v.price?esc(v.price):""}" placeholder="0" oninput="lineSumHint()"/>
        <div class="hint" id="iv_sumhint">Стоимость строки: <b>${lineSum?fmtNum(lineSum):"0"}</b> MDL</div>

      <div class="btnrow"><button class="btn primary" onclick="saveInvoice()">${v?"Сохранить":"＋ Внести приход"}</button>
        <button class="btn ghost" onclick="closeInvoiceForm()">Отмена</button></div>
    </div>
   </div>
  </div>`;
}
function lineSumHint(){
  const q=Number((document.getElementById("iv_qty")||{}).value||0);
  const p=Number((document.getElementById("iv_price")||{}).value||0);
  const el=document.getElementById("iv_sumhint");
  if(el)el.innerHTML="Стоимость строки: <b>"+fmtNum(q*p)+"</b> MDL";
}
function closeInvoiceForm(){editInv=null;showForm=false;render();}

function catOf(pid){const p=products.find(x=>x.id===pid);return (p&&p.cat)?p.cat:"СЗР";}

function saveInvoice(){
  const g=id=>document.getElementById(id);
  const name=g("iv_prod").value.trim();
  const qty=g("iv_qty").value.trim();
  if(!name||!qty){toast("Укажите наименование и количество");return;}
  const unit=g("iv_unit").value, cat=g("iv_cat").value;
  // найти/создать препарат, обновить его тип
  let p=products.find(x=>x.name.trim().toLowerCase()===name.toLowerCase());
  if(!p){p={id:"p"+Date.now()+Math.random().toString(36).slice(2,5),name,unit,cat};products.push(p);pushProducts();}
  else if(p.cat!==cat){p.cat=cat;pushProducts();}
  const base={
    date:g("iv_date").value?new Date(g("iv_date").value).getTime():Date.now(),
    supplier:g("iv_sup").value.trim(), invoiceNo:g("iv_no").value.trim(),
    productId:p.id, productName:p.name, unit, qty:Number(qty), price:Number(g("iv_price").value||0),
    grand:Number(g("iv_grand").value||0)};
  if(editInv){
    const inv=invoices.find(x=>x.id===editInv); Object.assign(inv,base);
    pushInvoice(inv); toast("Накладная изменена");
  } else {
    const inv=Object.assign({id:"i"+Date.now()+Math.random().toString(36).slice(2,5)},base);
    invoices.push(inv); pushInvoice(inv); toast("Приход внесён на склад");
  }
  editInv=null; showForm=false; render();
}
function deleteInvoice(id){invoices=invoices.filter(v=>v.id!==id);pushDeleteInvoice(id);render();}
function askDelInvoice(id){const v=invoices.find(x=>x.id===id);
  if(confirm("Удалить накладную «"+(v?v.productName:"")+"»?"))deleteInvoice(id);}

/* ===== ГРАФИКИ ===== */
const PAL=["#6C2E9C","#8E44AD","#2E8B57","#B9791C","#2C5D7C","#9B59B6","#16A085","#C0392B","#5B3A8E","#1F8A70"];
function unitCostMap(){
  const m={};
  const agg={};
  invoices.forEach(v=>{if(!v.productId)return;agg[v.productId]=agg[v.productId]||{q:0,c:0};
    agg[v.productId].q+=Number(v.qty||0);agg[v.productId].c+=Number(v.qty||0)*Number(v.price||0);});
  Object.keys(agg).forEach(pid=>{m[pid]=agg[pid].q>0?agg[pid].c/agg[pid].q:0;});
  return m;
}
function hbars(rows,opt){
  if(!rows.length)return `<div class="chart-empty">Пока нет данных.</div>`;
  opt=opt||{};
  const max=Math.max(...rows.map(r=>Math.abs(r.value)),1);
  const bars=rows.map(r=>{
    const w=Math.max(Math.abs(r.value)/max*100, r.value?2.5:0);   // мелкие суммы тоже видно
    return `<div class="hbar"><span class="lb"><span style="color:${r.color};font-weight:700">■</span> ${esc(r.label)}</span>
      <span class="track"><span class="fill" style="width:${w}%;background:${r.color}"></span></span>
      <span class="val" style="color:${r.color}">${fmtNum(r.value)}${r.suffix||""}</span></div>`;
  }).join("");
  const axis=opt.axis===false?"":`<div class="axis"><span class="lb"></span>
      <span class="ax"><i>0</i><i>${fmtNum(max/2)}</i><i>${fmtNum(max)}</i></span><span class="val"></span></div>`;
  return bars+axis;
}
function vbars(rows){
  if(!rows.length)return `<div class="chart-empty">Пока нет данных.</div>`;
  const max=Math.max(...rows.map(r=>r.value),1);
  return `<div class="vbars">${rows.map(r=>{
    const h=Math.max(r.value/max*100,1);
    return `<div class="vbar"><span class="cv">${r.value?fmtNum(r.value):""}</span>
      <div class="col" style="height:${h}%"></div><span class="cx">${esc(r.label)}</span></div>`;
  }).join("")}</div>`;
}
function donut(segs, centerBig, centerSm){
  const total=segs.reduce((s,x)=>s+x.value,0);
  if(!total)return `<div class="chart-empty">Пока нет данных.</div>`;
  let acc=0, stops=[];
  segs.forEach(s=>{const a=acc/total, b=(acc+s.value)/total;acc+=s.value;
    stops.push(`${s.color} ${(a*100).toFixed(2)}% ${(b*100).toFixed(2)}%`);});
  return `<div class="donutwrap">
    <div class="donut" style="background:conic-gradient(${stops.join(",")})">
      <div class="hole"><span class="big">${centerBig}</span><span class="sm">${centerSm||""}</span></div></div>
    <div class="legend">${segs.map(s=>`<div class="li"><span class="sw" style="background:${s.color}"></span>
      ${esc(s.label)}<span class="lv">${fmtNum(s.value)}</span></div>`).join("")}</div>
  </div>`;
}

function renderCharts(){
  const el=document.getElementById("chartsBody");
  const uc=unitCostMap();

  // 1) Остатки по препаратам — только те, где было движение; цвет по уровню
  const rem=products.map(p=>{
    const open=Number(p.opening)||0, inp=inForProduct(p), used=Number(p.used2026)||0, out=outForProduct(p);
    const base=open+inp, left=open+inp-used-out;
    let color="#2E8B57";
    if(left<=0)color="#C0392B";
    else if(base>0 && left<base*0.15)color="#B9791C";
    return {label:p.name,value:left,color,suffix:" "+(p.unit||""),active:(base+used+out)!==0};
  }).filter(r=>r.active).sort((a,b)=>b.value-a.value);

  // 2) Расход по культурам (в деньгах, MDL)
  const cropMoney={};
  items.forEach(t=>{if(t.status!=="done")return;
    const c=consumedQty(t);if(!c)return;
    let pid=t.actProductId;
    if(!pid){const p=products.find(x=>x.name.trim().toLowerCase()===String(t.actSubstance||"").trim().toLowerCase());pid=p?p.id:null;}
    const cost=pid&&uc[pid]?c*uc[pid]:0;
    const cr=t.crop||"(без культуры)";cropMoney[cr]=(cropMoney[cr]||0)+cost;});
  const cropRows=Object.keys(cropMoney).map((k,i)=>({label:k,value:Math.round(cropMoney[k]),color:PAL[i%PAL.length],suffix:" MDL"}))
    .sort((a,b)=>b.value-a.value);

  // 3) Выполнение обработок (все обработки)
  let done=0,over=0,rej=0,wait=0;
  items.forEach(t=>{const s=statusOf(t).key;
    if(s==="done")done++;else if(s==="overdue")over++;else if(s==="rejected")rej++;else wait++;});
  const totalT=done+over+rej+wait;
  const pct=totalT?Math.round(done/totalT*100):0;
  const statusDonut=donut([
    {label:"Выполнено",value:done,color:"#2E8B57"},
    {label:"Не выполнено",value:over,color:"#C0392B"},
    {label:"Не будет",value:rej,color:"#9A93A0"},
    {label:"В работе / ждёт",value:wait,color:"#6C2E9C"}
  ], pct+"%", "выполнено");

  // 4) Расходы в деньгах по месяцам (приход по накладным, 6 мес)
  const now=new Date();
  const months=[];
  for(let k=5;k>=0;k--){const d=new Date(now.getFullYear(),now.getMonth()-k,1);months.push(d);}
  const moneyRows=months.map(d=>{
    let sum=0;
    invoices.forEach(v=>{const dt=new Date(v.date);
      if(dt.getFullYear()===d.getFullYear()&&dt.getMonth()===d.getMonth())sum+=Number(v.qty||0)*Number(v.price||0);});
    return {label:MONTHS[d.getMonth()].slice(0,3)+" "+String(d.getFullYear()).slice(2),value:Math.round(sum)};
  });

  el.innerHTML=`
    <div class="panel"><h3>Остатки по препаратам</h3>${hbars(rem)}
      <div class="hint" style="margin-top:6px">
        <span style="color:#2E8B57;font-weight:700">■</span> в наличии ·
        <span style="color:#B9791C;font-weight:700">■</span> на исходе ·
        <span style="color:#C0392B;font-weight:700">■</span> закончился</div></div>

    <div class="panel"><h3>Выполнение обработок</h3>${statusDonut}</div>

    <div class="panel"><h3>Расход по культурам (в деньгах)</h3>${hbars(cropRows)}
      <div class="hint" style="margin-top:6px">Стоимость израсходованных СЗР по каждой культуре, по средней цене закупки.</div></div>

    <div class="panel"><h3>Закупки СЗР по месяцам (MDL)</h3>${vbars(moneyRows)}
      <div class="hint" style="margin-top:6px">Сумма по накладным за последние 6 месяцев.</div></div>
  `;
}
